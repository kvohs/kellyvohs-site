<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography — Kelly Vohs</title>
  <meta name="description" content="Photography by Kelly Vohs — Still Moving" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages/photography.css?v=4" />
</head>
<body>
  <div class="page">
    <main class="page__content">
      <div class="photo-layout">

        <!-- ========== SIDEBAR (header + post list) ========== -->
        <div class="photo-sidebar">
          <header class="page-header">
            <a class="subscribe-trigger" data-publication="vohs">Subscribe</a>
            <p class="page-header__desc">One image. Most weeks.</p>
          </header>

          <section class="photo-posts">
            <div class="photo-list" id="photoList">
              <!-- Posts rendered here by JavaScript -->
            </div>
          </section>
        </div>

        <!-- ========== READER PANEL (desktop only) ========== -->
        <div class="photo-reader" id="photoReaderPanel"></div>

      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="../components/nav.js"></script>
  <script src="../components/footer.js?v=2"></script>
  <script src="../js/subscribe.js"></script>
  <script src="../js/feed.js?v=2"></script>
  <script src="../js/photos-rss.js?v=3"></script>
  <script src="../js/search.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      loadCachedFirstPhoto();
      await renderPhotoPosts();
      autoLoadFirstPhoto();
    });
  </script>
</body>
</html>
