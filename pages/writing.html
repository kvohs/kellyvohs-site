<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Kelly Vohs</title>
  <meta name="description" content="Writing by Kelly Vohs — Better Today Than Yesterday" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages/writing.css" />
</head>
<body>
  <div class="page">
    <main class="page__content">

      <!-- ========== PAGE HEADER ========== -->
      <header class="page-header">
        <h1 class="page-header__title page-header__title--typing" id="typingTitle"></h1>
        <p class="page-header__desc">Sunday letters about getting better.</p>
        <a class="subscribe-trigger" data-publication="kellyvohs">Subscribe</a>
      </header>

      <!-- ========== POST LIST ========== -->
      <section class="writing-posts">
        <div class="post-list" id="postList">
          <!-- Posts rendered here by JavaScript -->
        </div>
      </section>

    </main>
  </div>

  <!-- Scripts -->
  <script src="../components/nav.js"></script>
  <script src="../components/footer.js"></script>
  <script src="../js/subscribe.js"></script>
  <script src="../js/rss.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderPosts();

      // Typewriter effect for "Words."
      const el = document.getElementById('typingTitle');
      if (el) {
        const word = 'Words.';
        let i = 0;
        const delay = 700;   // pause before typing starts
        const speed = 140;   // ms per character

        setTimeout(() => {
          const type = () => {
            if (i < word.length) {
              el.textContent += word[i];
              i++;
              setTimeout(type, speed);
            } else {
              // Typing done — flash cursor twice (~1.8s), then hide it
              setTimeout(() => {
                el.classList.add('typing-done');
              }, 1800);
            }
          };
          type();
        }, delay);
      }
    });
  </script>
</body>
</html>
