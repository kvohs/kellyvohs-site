<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Kelly Vohs</title>
  <meta name="description" content="Writing by Kelly Vohs — Better Today Than Yesterday" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages/writing.css?v=29" />
</head>
<body>
  <div class="page">
    <main class="page__content">
      <div class="writing-layout">

        <!-- ========== SIDEBAR (header + post list) ========== -->
        <div class="writing-sidebar">
          <header class="page-header">
            <a class="subscribe-trigger" data-publication="kellyvohs">Subscribe</a>
            <p class="page-header__desc">Sunday letters about getting better.</p>
          </header>

          <section class="writing-posts">
            <div class="post-list" id="postList">
              <!-- Posts rendered here by JavaScript -->
            </div>
          </section>
        </div>

        <!-- ========== READER PANEL (desktop only) ========== -->
        <div class="writing-reader" id="readerPanel"></div>

      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="../components/nav.js"></script>
  <script src="../components/footer.js?v=2"></script>
  <script src="../js/subscribe.js"></script>
  <script src="../js/feed.js?v=2"></script>
  <script src="../js/rss.js?v=38"></script>
  <script src="../js/search.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      loadCachedFirstPost();
      await renderPosts();
      autoLoadFirstPost();
    });
  </script>
</body>
</html>
