<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelly Vohs</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages/post.css" />
  <link rel="stylesheet" href="../styles/pages/writing.css" />
</head>
<body>
  <div class="page">
    <main class="page__content">

      <article class="post" id="postContent">
        <div class="loading">Loading...</div>
      </article>

    </main>
  </div>

  <!-- Scripts -->
  <script src="../components/nav.js"></script>
  <script src="../components/footer.js?v=2"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const container = document.getElementById('postContent');

      // Try sessionStorage first (coming from writing page)
      const cached = sessionStorage.getItem('post_' + slug);
      if (cached) {
        renderPost(JSON.parse(cached), container);
        return;
      }

      // Otherwise fetch from both RSS (for content) and API (for audio fallback)
      Promise.all([
        fetch('/api/rss').then(r => r.json()),
        fetch('/api/rss?source=api').then(r => r.json()).catch(() => ({ items: [] }))
      ])
        .then(([data, apiData]) => {
          if (data.status !== 'ok') throw new Error('Feed error');
          const item = data.items.find(i => getSlug(i.link) === slug);
          if (!item) throw new Error('Post not found');

          // If RSS is missing audio or content, check the API response
          let audioUrl = item.audioUrl || null;
          let content = item.content || '';
          if (apiData.items) {
            const apiItem = apiData.items.find(i => getSlug(i.link) === slug);
            if (apiItem) {
              if (!audioUrl) audioUrl = apiItem.audioUrl || null;
              if (!content) content = apiItem.content || '';
            }
          }

          renderPost({
            title: item.title,
            date: new Date(item.pubDate).toLocaleDateString('en-US', {
              year: 'numeric', month: 'long', day: 'numeric'
            }),
            content,
            link: item.link,
            audioUrl
          }, container);
        })
        .catch(() => {
          container.innerHTML = `
            <div class="post__header">
              <p class="post__date">Post not found</p>
              <a href="writing.html" class="post__back">&larr; Back to Writing</a>
            </div>
          `;
        });
    });

    function renderPost(post, container) {
      document.title = post.title + ' — Kelly Vohs';

      const audioPlayerHTML = post.audioUrl ? `
        <div class="audio-player" data-src="${post.audioUrl}">
          <button class="audio-player__btn" type="button">&#9654; <em>Listen</em></button>
          <span class="audio-player__time">0:00 / 0:00</span>
          <div class="audio-player__track"><div class="audio-player__fill"></div></div>
        </div>
      ` : '';

      container.innerHTML = `
        <header class="post__header">
          <a href="writing.html" class="post__back">&larr; Back</a>
          <p class="post__date">${post.date}</p>
          <h1 class="post__title">${post.title}</h1>
          ${audioPlayerHTML}
        </header>
        <div class="post__body">${post.content}</div>
        <footer class="post__footer">
          <a href="${post.link}" target="_blank" rel="noopener" class="post__substack-link">
            Read on Substack
          </a>
          <a href="writing.html" class="post__back">&larr; Back to all posts</a>
        </footer>
      `;

      if (post.audioUrl) {
        initPostAudioPlayer(container.querySelector('.audio-player'));
      }
    }

    function initPostAudioPlayer(el) {
      const btn = el.querySelector('.audio-player__btn');
      const timeEl = el.querySelector('.audio-player__time');
      const track = el.querySelector('.audio-player__track');
      const fill = el.querySelector('.audio-player__fill');
      let audio = null;

      function fmt(s) {
        if (!s || !isFinite(s)) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
      }

      btn.addEventListener('click', () => {
        if (!audio) {
          audio = new Audio(el.dataset.src);
          audio.preload = 'metadata';
          audio.addEventListener('loadedmetadata', () => {
            timeEl.textContent = '0:00 / ' + fmt(audio.duration);
          });
          audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
            timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
          });
          audio.addEventListener('ended', () => {
            el.classList.remove('audio-player--playing');
            btn.innerHTML = '&#9654; <em>Listen</em>';
            fill.style.width = '0%';
          });
        }
        if (audio.paused) {
          audio.play();
          el.classList.add('audio-player--playing');
          btn.innerHTML = '&#9646;&#9646; <em>Pause</em>';
        } else {
          audio.pause();
          el.classList.remove('audio-player--playing');
          btn.innerHTML = '&#9654; <em>Listen</em>';
        }
      });

      track.addEventListener('click', (e) => {
        if (!audio || !audio.duration) return;
        const rect = track.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
      });
    }

    function getSlug(url) {
      try {
        const parts = new URL(url).pathname.split('/');
        return parts[parts.length - 1] || parts[parts.length - 2];
      } catch { return ''; }
    }
  </script>
</body>
</html>
