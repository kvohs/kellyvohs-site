<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelly Vohs</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="../styles/archive.css?v=11" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages/post.css" />
  <link rel="stylesheet" href="../styles/pages/writing.css" />
</head>
<body>
  <div class="page">
    <main class="page__content">

      <article class="post" id="postContent">
        <div class="loading">Loading...</div>
      </article>

    </main>
  </div>

  <!-- Scripts -->
  <script src="../js/subscribe.js"></script>
  <script src="../js/sitebar.js"></script>
  <script src="../js/archive-menu.js?v=2"></script>
  <script src="../js/archive-subscribe.js?v=5"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    const isPhotos = params.get('feed') === 'photos';
    const feedParam = isPhotos ? 'feed=photos&' : '';
    const backHref = isPhotos ? '/photography' : '/writing';
    const backLabel = isPhotos ? 'Photography' : 'Writing';

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('postContent');

      // Try sessionStorage first (coming from writing page)
      const cached = isPhotos ? null : sessionStorage.getItem('post_' + slug);
      if (cached) {
        renderPost(JSON.parse(cached), container);
        return;
      }

      // Otherwise fetch from both RSS (recent posts, full content) and
      // API (all posts — older ones only exist here)
      Promise.all([
        fetch('/api/rss?' + feedParam).then(r => r.json()).catch(() => ({ items: [] })),
        fetch('/api/rss?' + feedParam + 'source=api').then(r => r.json()).catch(() => ({ items: [] }))
      ])
        .then(([data, apiData]) => {
          const rssItems = data.items || [];
          const apiItems = apiData.items || [];
          const apiItem = apiItems.find(i => getSlug(i.link) === slug);
          const item = rssItems.find(i => getSlug(i.link) === slug) || apiItem;
          if (!item) throw new Error('Post not found');

          // Prefer RSS fields, fall back to the API version
          let audioUrl = item.audioUrl || (apiItem && apiItem.audioUrl) || null;
          let content = item.content || (apiItem && apiItem.content) || '';

          renderPost({
            title: item.title,
            date: new Date(item.pubDate).toLocaleDateString('en-US', {
              year: 'numeric', month: 'long', day: 'numeric'
            }),
            content,
            link: item.link,
            audioUrl,
            number: apiItem ? apiItems.length - apiItems.indexOf(apiItem) : null
          }, container);
        })
        .catch(() => {
          container.innerHTML = `
            <div class="post__header">
              <p class="post__date">Post not found</p>
              <a href="${backHref}" class="post__back">&larr; Back to ${backLabel}</a>
            </div>
          `;
        });
    });

    function renderPost(post, container) {
      document.title = post.title + ' — Kelly Vohs';

      const audioPlayerHTML = post.audioUrl ? `
        <div class="audio-player" data-src="${post.audioUrl}">
          <button class="audio-player__btn" type="button">&#9654; <em>Listen</em></button>
          <span class="audio-player__time">0:00 / 0:00</span>
          <div class="audio-player__track"><div class="audio-player__fill"></div></div>
        </div>
      ` : '';

      const dateline = (isPhotos ? '' : 'Sunday Letter &mdash; ') + post.date;

      const div = document.createElement('div');
      div.innerHTML = post.content;
      const words = (div.textContent || '').trim().split(/\s+/).length;
      const mins = Math.max(1, Math.round(words / 220));
      const folio = (post.number ? 'No. ' + post.number + ' &mdash; ' : '') + mins + ' min read';

      container.innerHTML = `
        <header class="post__header">
          <a href="${backHref}" class="post__back">&larr; Back</a>
          <p class="post__date">${dateline}</p>
          <h1 class="post__title">${post.title}</h1>
          ${audioPlayerHTML}
        </header>
        <div class="post__body">${post.content}</div>
        <footer class="post__footer">
          <span class="post__folio">${folio}</span>
          <a href="${backHref}" class="post__back">&larr; Back to all posts</a>
        </footer>
      `;

      const footerEl = container.querySelector('.post__footer');
      container.insertBefore(buildSubscribeBlock(isPhotos ? 'vohs' : 'kellyvohs'), footerEl);

      if (post.audioUrl) {
        initPostAudioPlayer(container.querySelector('.audio-player'));
      }
    }

    function initPostAudioPlayer(el) {
      const btn = el.querySelector('.audio-player__btn');
      const timeEl = el.querySelector('.audio-player__time');
      const track = el.querySelector('.audio-player__track');
      const fill = el.querySelector('.audio-player__fill');
      let audio = null;

      function fmt(s) {
        if (!s || !isFinite(s)) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
      }

      btn.addEventListener('click', () => {
        if (!audio) {
          audio = new Audio(el.dataset.src);
          audio.preload = 'metadata';
          audio.addEventListener('loadedmetadata', () => {
            timeEl.textContent = '0:00 / ' + fmt(audio.duration);
          });
          audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
            timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
          });
          audio.addEventListener('ended', () => {
            el.classList.remove('audio-player--playing');
            btn.innerHTML = '&#9654; <em>Listen</em>';
            fill.style.width = '0%';
          });
        }
        if (audio.paused) {
          audio.play();
          el.classList.add('audio-player--playing');
          btn.innerHTML = '&#9646;&#9646; <em>Pause</em>';
        } else {
          audio.pause();
          el.classList.remove('audio-player--playing');
          btn.innerHTML = '&#9654; <em>Listen</em>';
        }
      });

      track.addEventListener('click', (e) => {
        if (!audio || !audio.duration) return;
        const rect = track.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
      });
    }

    function getSlug(url) {
      try {
        const parts = new URL(url).pathname.split('/');
        return parts[parts.length - 1] || parts[parts.length - 2];
      } catch { return ''; }
    }
  </script>
</body>
</html>
