<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kelly Vohs</title>
<meta name="description" content="Photographs by Kelly Vohs." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/archive.css?v=9" />
<style>
  /* the landing room: photographs first, words almost nowhere */
  .strip { padding-bottom: 8px; }
  .strip .print { margin: 0 0 110px; }
  .strip .print--framed { margin-left: auto; margin-right: auto; }

  /* one typed breath between the prints */
  .breath {
    max-width: 720px;
    margin: 0 auto 110px;
    padding: 0 28px;
    text-align: center;
  }
  .breath__quote {
    font-style: italic;
    font-size: 18px;
    line-height: 1.7;
    color: rgba(10, 10, 10, 0.55);
  }
  .breath__src {
    display: inline-block;
    margin-top: 18px;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .breath__src:hover { color: var(--accent); }

  .land { position: relative; margin-bottom: 110px; }
  .land figcaption {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .land .more {
    background: none; border: none;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s ease;
    padding: 0;
  }
  .land .more:hover { color: var(--accent); }
  .strip .land { margin-top: 94px; }
  .land img { height: min(80svh, 920px); object-fit: cover; }
  @media (max-width: 760px) {
    .strip .land { margin-top: 76px; }
    .land img { height: 62svh; }
  }
</style>
</head>
<body>

<div class="carriage" id="carriage"></div>

<header class="bar" id="bar">
  <div class="bar__row">
    <a class="bar__home" href="/">KELLYVOHS</a>
    <nav class="bar__links">
      <span class="bar__search" id="barSearch">
        <input class="bar__searchinput" id="barSearchInput" type="text" placeholder="find a letter&hellip;" aria-label="Find a letter" />
        <button class="bar__mag" aria-label="Search the letters"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"></circle><line x1="10.4" y1="10.4" x2="14" y2="14"></line></svg></button>
      </span>
      <a class="bar__link bar__link--here" href="/">Photos</a>
      <a class="bar__link" href="/sundays">Sundays</a>
      <button class="bar__link" data-search>Catalog</button>
      <a class="bar__link" href="/made">Made</a>
      <button class="bar__link" data-subscribe>Subscribe</button>
    </nav>
  </div>
</header>
<nav class="thumb">
  <button class="thumb__search" data-search><span class="thumb__caret"></span>type to find a letter&hellip;</button>
  <button class="thumb__more" data-more aria-label="Menu"><i></i><i></i><i></i></button>
</nav>

<main class="strip">

  <!-- land on the photograph. no name, no pitch. -->
  <figure class="print print--framed land">
    <img src="/assets/images/hero/hero.jpg" alt="Figure standing on reflective beach" />
    <figcaption>
      <span><span class="frame">KV_03543</span> — MAUKATIA BAY, NZ &middot; <a class="geo" href="https://www.google.com/maps?q=-36.8401,174.4310" target="_blank" rel="noopener">-36.8401, 174.4310</a></span>
      <button class="more" id="downBtn">&darr; MORE BELOW</button>
    </figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/DJI_0084.jpg" alt="Mountain and glacial plain from above" />
    <figcaption><span class="frame">DJI_0084</span> — JÖKULSÁRLÓN, ICELAND &middot; <a class="geo" href="https://www.google.com/maps?q=64.1154,-16.0869" target="_blank" rel="noopener">64.1154, -16.0869</a></figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/KV_04864.jpg" alt="Egret reflected in still water" />
    <figcaption><span class="frame">KV_04864</span> — TALBOT ISLAND, USA &middot; <a class="geo" href="https://www.google.com/maps?q=30.5098,-81.4576" target="_blank" rel="noopener">30.5098, -81.4576</a></figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/KV_03334.jpg" alt="Desert dunes and distant mountains" />
    <figcaption><span class="frame">KV_03334</span> — DEATH VALLEY, USA &middot; <a class="geo" href="https://www.google.com/maps?q=36.6124,-117.1139" target="_blank" rel="noopener">36.6124, -117.1139</a></figcaption>
  </figure>

  <!-- a quiet line from the letters -->
  <p class="breath">
    <span class="breath__quote">The good times are just the times. Often, you don&rsquo;t know they are the good times until you look back. Sometimes you do. Those moments when you look around and say, &lsquo;this is good.&rsquo;</span><br />
    <a class="breath__src" href="/sundays">from sundays &rarr;</a>
  </p>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/KV_08612.jpg" alt="Silhouetted figures on rocky shore" />
    <figcaption><span class="frame">KV_08612</span> — GUANACASTE, COSTA RICA &middot; <a class="geo" href="https://www.google.com/maps?q=10.1976,-85.8339" target="_blank" rel="noopener">10.1976, -85.8339</a></figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/DSC00030-Edit.jpg" alt="Winter trees and fence in snow" />
    <figcaption><span class="frame">DSC00030</span> — CONNECTICUT, USA &middot; <a class="geo" href="https://www.google.com/maps?q=41.5761,-73.2978" target="_blank" rel="noopener">41.5761, -73.2978</a></figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/KV_00949.jpg" alt="Seal surfacing in calm water" />
    <figcaption><span class="frame">KV_00949</span> — BERUFJÖRÐUR, ICELAND &middot; <a class="geo" href="https://www.google.com/maps?q=64.7895,-14.4859" target="_blank" rel="noopener">64.7895, -14.4859</a></figcaption>
  </figure>

</main>

<footer class="foot">
  <p><a href="/">PHOTOS</a> · <a href="/sundays">SUNDAYS</a> · <a href="/made">MADE</a></p>
</footer>

<script>
  function onScroll() {
    var h = document.documentElement;
    var max = h.scrollHeight - h.clientHeight;
    document.getElementById('carriage').style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';
    document.getElementById('bar').classList.toggle('bar--scrolled', window.scrollY > 20);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
  document.getElementById('downBtn').addEventListener('click', function () {
    window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
  });
</script>

<script src="js/archive-menu.js?v=2"></script>
<script src="js/archive-subscribe.js?v=5"></script>
</body>
</html>
