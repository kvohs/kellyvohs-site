<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kelly Vohs</title>
<meta name="description" content="Photographs by Kelly Vohs." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/archive.css?v=14" />
<style>
  /* the landing room: photographs first, words almost nowhere */
  .strip { padding-bottom: 8px; }
  .strip .print { margin: 0 0 110px; }
  .strip .print--framed { margin-left: auto; margin-right: auto; }

  /* one typed breath between the prints */
  .breath {
    max-width: 720px;
    margin: 0 auto 110px;
    padding: 0 28px;
    text-align: center;
  }
  .breath__quote {
    font-style: italic;
    font-size: 18px;
    line-height: 1.7;
    color: rgba(10, 10, 10, 0.55);
  }
  .breath__src {
    display: inline-block;
    margin-top: 18px;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .breath__src:hover { color: var(--accent); }

  .land { position: relative; margin-bottom: 110px; }
  .land figcaption {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
  }
  .land__meta { display: flex; flex-direction: column; min-width: 0; }
  .land .more {
    background: none; border: none;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s ease;
    padding: 0;
  }
  .land .more:hover { color: var(--accent); }
  .strip .land { margin-top: 94px; }
  .land img { height: min(80svh, 920px); object-fit: cover; }
  @media (max-width: 760px) {
    .strip .land { margin-top: 76px; }
    .land img { height: 62svh; }
  }
</style>
</head>
<body>

<div class="carriage" id="carriage"></div>

<header class="bar" id="bar"><div class="bar__row"><a class="bar__home" href="/">KELLY VOHS</a><nav class="bar__links"><span class="bar__search" id="barSearch"><input class="bar__searchinput" id="barSearchInput" type="text" placeholder="find" aria-label="Find" /><button class="bar__mag" aria-label="Search the letters"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"></circle><line x1="10.4" y1="10.4" x2="14" y2="14"></line></svg></button></span><a class="bar__link bar__link--here" href="/">Photos</a><a class="bar__link" href="/sundays">Sundays</a><button class="bar__link" data-search>Catalog</button><a class="bar__link" href="/made">Made</a><button class="bar__link" data-subscribe>Subscribe</button></nav></div></header><nav class="thumb"><button class="thumb__search" data-search><span class="thumb__caret"></span>find</button><button class="thumb__more" data-more aria-label="Menu"><i></i><i></i><i></i></button></nav>

<main class="strip">

  <!-- land on the photograph. no name, no pitch. -->
  <figure class="print print--framed land">
    <img src="/assets/images/hero/hero.jpg" alt="Figure standing on reflective beach" />
    <figcaption>
      <span class="land__meta">
        <span><a class="geo" href="https://www.google.com/maps?q=-36.8353,174.4263" target="_blank" rel="noopener">MAUKATIA BAY, NZ</a> &middot; 60HTE7048720306</span>
        <span class="exif"><span class="frame">KV_03543</span> &middot; 50mm &middot; f/1.2 &middot; 1/4000 &middot; ISO 100</span>
      </span>
      <button class="more" id="downBtn">&darr; MORE BELOW</button>
    </figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/DJI_0084.jpg" alt="Mountain and glacial plain from above" />
    <figcaption><a class="geo" href="https://www.google.com/maps?q=64.1154,-16.0869" target="_blank" rel="noopener">ESJUFJÖLL, ICELAND</a> &middot; 28WDS4705810325<span class="exif"><span class="frame">DJI_0084</span> &middot; 24mm &middot; f/2.8 &middot; 1/2000 &middot; ISO 130</span></figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/KV_04864.jpg" alt="Egret reflected in still water" />
    <figcaption><a class="geo" href="https://www.google.com/maps?q=30.5098,-81.4576" target="_blank" rel="noopener">TALBOT ISLAND, USA</a> &middot; 17RMP5609275366<span class="exif"><span class="frame">KV_04864</span></span></figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/KV_03334.jpg" alt="Desert dunes and distant mountains" />
    <figcaption><a class="geo" href="https://www.google.com/maps?q=36.6124,-117.1139" target="_blank" rel="noopener">DEATH VALLEY, USA</a> &middot; 11SMA8981451882<span class="exif"><span class="frame">KV_03334</span> &middot; 50mm &middot; f/3.2 &middot; 1/1250 &middot; ISO 125</span></figcaption>
  </figure>

  <!-- a quiet line from the letters -->
  <p class="breath">
    <span class="breath__quote">The good times are just the times. Unless you take a second to look around and say, &lsquo;this is good.&rsquo;</span><br />
    <a class="breath__src" href="/sundays">from sundays &rarr;</a>
  </p>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/KV_08612.jpg" alt="Silhouetted figures on rocky shore" />
    <figcaption><a class="geo" href="https://www.google.com/maps?q=10.1976,-85.8339" target="_blank" rel="noopener">GUANACASTE, COSTA RICA</a> &middot; 16PFS2772927490<span class="exif"><span class="frame">KV_08612</span> &middot; 50mm &middot; f/2.8 &middot; 1/100 &middot; ISO 125</span></figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/DSC00030-Edit.jpg" alt="Winter trees and fence in snow" />
    <figcaption><a class="geo" href="https://www.google.com/maps?q=41.5761,-73.2978" target="_blank" rel="noopener">CONNECTICUT, USA</a> &middot; 18TXM4190604111<span class="exif"><span class="frame">DSC00030</span> &middot; 35mm &middot; f/1.4 &middot; 1/1250 &middot; ISO 800</span></figcaption>
  </figure>

  <figure class="print print--framed">
    <img src="/assets/images/gallery/KV_00949.jpg" alt="Seal surfacing in calm water" />
    <figcaption><a class="geo" href="https://www.google.com/maps?q=64.7895,-14.4859" target="_blank" rel="noopener">BERUFJÖRÐUR, ICELAND</a> &middot; 28WES2443385094<span class="exif"><span class="frame">KV_00949</span> &middot; 400mm &middot; f/5.6 &middot; 1/640 &middot; ISO 320</span></figcaption>
  </figure>

</main>

<footer class="foot"><p><a href="/">PHOTOS</a> · <a href="/sundays">SUNDAYS</a> · <a href="/made">MADE</a></p></footer>

<script>
  function onScroll() {
    var h = document.documentElement;
    var max = h.scrollHeight - h.clientHeight;
    document.getElementById('carriage').style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';
    document.getElementById('bar').classList.toggle('bar--scrolled', window.scrollY > 20);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
  document.getElementById('downBtn').addEventListener('click', function () {
    window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
  });
</script>

<script src="js/archive-menu.js?v=3"></script>
<script src="js/archive-subscribe.js?v=5"></script>
</body>
</html>
