<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHOOP — Connected</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f0;
      --fg: #0a0a0a;
      --accent: #b5572a;
      --gray: #666;
      --font-serif: 'EB Garamond', Georgia, 'Times New Roman', serif;
      --font-sans: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: clamp(0.95rem, 0.9rem + 0.25vw, 1.1rem);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 480px;
      padding: 2rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: clamp(1.4rem, 1.2rem + 1vw, 2rem);
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--gray);
      font-size: clamp(0.8rem, 0.75rem + 0.2vw, 0.9rem);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Connected</h1>
    <p>WHOOP authorization complete. You can close this window.</p>
  </div>
</body>
</html>
